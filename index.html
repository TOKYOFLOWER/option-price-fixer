<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オプション価格修正ツール</title>
  <script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
    }

    /* Step Cards */
    .step {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .step-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.8rem;
    }
    .step-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #4a6cf7;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-title { font-size: 1rem; font-weight: 600; color: #1a1a2e; }
    .step-desc { font-size: 0.8rem; color: #888; margin-bottom: 1rem; }

    /* Drop Zone */
    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #999;
      font-size: 0.9rem;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #4a6cf7;
      background: #f5f7ff;
      color: #4a6cf7;
    }
    .drop-zone.loaded {
      border-color: #22c55e;
      background: #f0fdf4;
      color: #16a34a;
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .file-info {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #16a34a;
      font-weight: 500;
    }

    /* Run Button */
    .run-btn {
      display: block;
      width: 100%;
      padding: 0.85rem;
      font-size: 1.05rem;
      font-weight: 600;
      background: #4a6cf7;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .run-btn:hover { background: #3b5de7; }
    .run-btn:disabled { background: #c5cee0; cursor: not-allowed; }

    /* Result */
    .result-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1.2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: none;
    }
    .result-card.visible { display: block; }
    .result-summary {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #1a1a2e;
    }
    .result-summary span { color: #4a6cf7; }

    .diff-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-bottom: 1.2rem;
    }
    .diff-table th {
      background: #f8f9fb;
      padding: 0.5rem 0.6rem;
      text-align: left;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #e5e7eb;
    }
    .diff-table td {
      padding: 0.45rem 0.6rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .diff-table tr:hover td { background: #fafbff; }
    .old-price { color: #ef4444; text-decoration: line-through; }
    .new-price { color: #22c55e; font-weight: 600; }
    .no-match {
      text-align: center;
      color: #888;
      padding: 2rem;
      font-size: 0.9rem;
    }

    .download-btn {
      display: inline-block;
      padding: 0.7rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .download-btn:hover { background: #16a34a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Option Price Fixer</h1>
    <p class="subtitle">Product CSVの価格をもとにOption CSVのsubcode-priceを一括修正</p>

    <!-- Step 1 -->
    <div class="step">
      <div class="step-header">
        <div class="step-number">1</div>
        <div class="step-title">Product CSV を選択</div>
      </div>
      <p class="step-desc">D列(index3): SKUコード / J列(index9): 販売価格</p>
      <div class="drop-zone" id="dropProduct">
        ここにファイルをドラッグ＆ドロップ、またはクリックして選択
        <input type="file" id="fileProduct" accept=".csv">
      </div>
      <div class="file-info" id="infoProduct"></div>
    </div>

    <!-- Step 2 -->
    <div class="step">
      <div class="step-header">
        <div class="step-number">2</div>
        <div class="step-title">Option CSV を選択</div>
      </div>
      <p class="step-desc">B列(index1): sub-code / O列(index14): subcode-price（修正対象）</p>
      <div class="drop-zone" id="dropOption">
        ここにファイルをドラッグ＆ドロップ、またはクリックして選択
        <input type="file" id="fileOption" accept=".csv">
      </div>
      <div class="file-info" id="infoOption"></div>
    </div>

    <!-- Step 3 -->
    <div class="step">
      <div class="step-header">
        <div class="step-number">3</div>
        <div class="step-title">修正を実行</div>
      </div>
      <button class="run-btn" id="runBtn" disabled>価格を修正する</button>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="step-header">
        <div class="step-number" style="background:#22c55e;">4</div>
        <div class="step-title">修正結果</div>
      </div>
      <p class="result-summary" id="summary"></p>
      <table class="diff-table" id="diffTable">
        <thead>
          <tr><th>行</th><th>sub-code</th><th>旧価格</th><th>新価格</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <button class="download-btn" id="downloadBtn">修正済みCSVをダウンロード</button>
    </div>
  </div>

  <script>
    let productMap = null;
    let optionRows = null;
    let outputBlob = null;

    /* ---- CSV Helpers ---- */
    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const bytes = new Uint8Array(reader.result);
          const detected = Encoding.detect(bytes);
          const unicode = Encoding.convert(bytes, { to: 'UNICODE', from: detected });
          resolve(Encoding.codeToString(unicode));
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsArrayBuffer(file);
      });
    }

    function parseCSV(text) {
      const rows = [];
      let cur = '', inQ = false, row = [];
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQ) {
          if (c === '"') {
            if (text[i + 1] === '"') { cur += '"'; i++; } else { inQ = false; }
          } else { cur += c; }
        } else {
          if (c === '"') { inQ = true; }
          else if (c === ',') { row.push(cur); cur = ''; }
          else if (c === '\n') { row.push(cur); cur = ''; rows.push(row); row = []; }
          else if (c !== '\r') { cur += c; }
        }
      }
      if (cur || row.length) { row.push(cur); rows.push(row); }
      return rows;
    }

    function toCSVText(rows) {
      return rows.map(r => r.map(c => {
        if (c.includes(',') || c.includes('"') || c.includes('\n')) return '"' + c.replace(/"/g, '""') + '"';
        return c;
      }).join(',')).join('\r\n');
    }

    /* ---- Drag & Drop Setup ---- */
    function setupDropZone(zoneId, inputId, infoId, onLoad) {
      const zone = document.getElementById(zoneId);
      const input = document.getElementById(inputId);
      const info = document.getElementById(infoId);

      function handleFile(file) {
        if (!file) return;
        onLoad(file, info);
        zone.classList.add('loaded');
      }

      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
      });
      input.addEventListener('change', () => handleFile(input.files[0]));
    }

    /* ---- Load Product CSV ---- */
    setupDropZone('dropProduct', 'fileProduct', 'infoProduct', async (file, info) => {
      try {
        const text = await readFileAsText(file);
        const rows = parseCSV(text);
        productMap = {};
        let count = 0;
        for (let i = 1; i < rows.length; i++) {
          const sku = (rows[i][3] || '').trim();
          const price = (rows[i][9] || '').trim();
          if (sku) { productMap[sku] = price; count++; }
        }
        info.textContent = file.name + ' - ' + count + ' 件のSKUを読み込み';
      } catch (e) {
        info.textContent = 'エラー: ' + e.message;
        info.style.color = '#ef4444';
      }
      updateBtn();
    });

    /* ---- Load Option CSV ---- */
    setupDropZone('dropOption', 'fileOption', 'infoOption', async (file, info) => {
      try {
        const text = await readFileAsText(file);
        optionRows = parseCSV(text);
        info.textContent = file.name + ' - ' + (optionRows.length - 1) + ' 行を読み込み';
      } catch (e) {
        info.textContent = 'エラー: ' + e.message;
        info.style.color = '#ef4444';
      }
      updateBtn();
    });

    function updateBtn() {
      document.getElementById('runBtn').disabled = !(productMap && optionRows);
    }

    /* ---- Run ---- */
    document.getElementById('runBtn').addEventListener('click', () => {
      if (!productMap || !optionRows) return;

      const tbody = document.querySelector('#diffTable tbody');
      tbody.innerHTML = '';
      let changed = 0;

      for (let i = 1; i < optionRows.length; i++) {
        const row = optionRows[i];
        const subCode = (row[1] || '').trim();
        const oldPrice = (row[14] || '').trim();

        if (subCode && productMap.hasOwnProperty(subCode)) {
          const newPrice = productMap[subCode];
          if (oldPrice !== newPrice) {
            row[14] = newPrice;
            changed++;
            const tr = document.createElement('tr');
            tr.innerHTML =
              '<td>' + (i + 1) + '</td>' +
              '<td>' + subCode + '</td>' +
              '<td class="old-price">' + oldPrice + '</td>' +
              '<td class="new-price">' + newPrice + '</td>';
            tbody.appendChild(tr);
          }
        }
      }

      document.getElementById('summary').innerHTML =
        '<span>' + changed + '</span> 件の価格を修正しました（全 ' + (optionRows.length - 1) + ' 行中）';

      if (changed === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="no-match">変更対象はありませんでした</td></tr>';
      }

      const csv = toCSVText(optionRows);
      const sjis = Encoding.convert(Encoding.stringToCode(csv), { to: 'SJIS', from: 'UNICODE' });
      outputBlob = new Blob([new Uint8Array(sjis)], { type: 'text/csv' });

      document.getElementById('resultCard').classList.add('visible');
    });

    /* ---- Download ---- */
    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!outputBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(outputBlob);
      a.download = 'option_fixed.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
